<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" fill="none" role="img" aria-label="Medoed — diabetes companion">
<defs>
<linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2c1305"/><stop offset="1" stop-color="#3f1d08"/></linearGradient>
<linearGradient id="morg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffb14e"/><stop offset="1" stop-color="#ff8a00"/></linearGradient>
<radialGradient id="mglow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ff9700" stop-opacity="0.28"/><stop offset="1" stop-color="#ff9700" stop-opacity="0"/></radialGradient>
<filter id="msoft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="22"/></filter>
<style>@keyframes hx{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}} .hx{animation:hx 4.2s ease-in-out infinite}</style>
</defs>
<rect width="1200" height="240" rx="20" fill="url(#mbg)"/>
<ellipse cx="1010" cy="120" rx="240" ry="150" fill="url(#mglow)" filter="url(#msoft)"/>
<!-- faint honeycomb -->
<g stroke="#ff9700" stroke-width="1" opacity="0.10" fill="none">
 <path d="M120 30 l20 12 v24 l-20 12 l-20 -12 v-24 Z"/><path d="M170 58 l20 12 v24 l-20 12 l-20 -12 v-24 Z"/>
</g>
<g transform="translate(74 118)">
 <text x="0" y="0" font-size="56" font-weight="800" fill="#ffe6c9" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">Medoed</text>
 <rect x="3" y="18" width="230" height="4" rx="2" fill="url(#morg)"/>
 <text x="3" y="52" font-size="17" font-weight="600" fill="#e0a877" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">Diabetes companion — insulin bolus &amp; carb tracking</text>
</g>
<!-- hexagon + badger bars (app icon) -->
<g transform="translate(1020 120)"><g class="hx">
 <path d="M0 -78 L68 -39 V39 L0 78 L-68 39 V-39 Z" fill="#160a02" stroke="url(#morg)" stroke-width="2.4"/>
 <g fill="url(#morg)">
  <rect x="-40" y="-26" width="80" height="15" rx="7.5"/>
  <rect x="-40" y="-4" width="52" height="15" rx="7.5"/><rect x="20" y="-4" width="20" height="15" rx="7.5"/>
  <rect x="-40" y="18" width="80" height="15" rx="7.5"/>
 </g>
</g></g>
</svg>